<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blooming Garden</title>
  <link rel="stylesheet" href="styles.css" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,400&family=Cormorant+Garamond:wght@300;400&display=swap" rel="stylesheet" />
</head>
<body>

  <!-- Sky background with sun and clouds -->
  <div class="sky">
    <div class="sun"></div>
    <div class="sun-rays"></div>

    <div class="cloud cloud-1"></div>
    <div class="cloud cloud-2"></div>
    <div class="cloud cloud-3"></div>

    <!-- Stars (visible at top, faint) -->
    <div class="stars" id="stars"></div>
  </div>

  <!-- Ground -->
  <div class="ground">
    <div class="ground-top"></div>
    <div class="grass-blades" id="grassBlades"></div>
  </div>

  <!-- The Flower -->
  <div class="flower-container" id="flowerContainer">

    <!-- Leaves on stem -->
    <div class="leaf leaf-left"></div>
    <div class="leaf leaf-right"></div>
    <div class="leaf leaf-left-low"></div>

    <!-- Stem -->
    <div class="stem"></div>

    <!-- Flower head -->
    <div class="flower-head" id="flowerHead">
      <!-- Petals -->
      <div class="petal-ring" id="petalRing">
        <div class="petal" style="--i:0"></div>
        <div class="petal" style="--i:1"></div>
        <div class="petal" style="--i:2"></div>
        <div class="petal" style="--i:3"></div>
        <div class="petal" style="--i:4"></div>
        <div class="petal" style="--i:5"></div>
        <div class="petal" style="--i:6"></div>
        <div class="petal" style="--i:7"></div>
      </div>
      <!-- Inner petals -->
      <div class="petal-ring inner-ring" id="innerPetalRing">
        <div class="petal inner-petal" style="--i:0"></div>
        <div class="petal inner-petal" style="--i:1"></div>
        <div class="petal inner-petal" style="--i:2"></div>
        <div class="petal inner-petal" style="--i:3"></div>
        <div class="petal inner-petal" style="--i:4"></div>
        <div class="petal inner-petal" style="--i:5"></div>
        <div class="petal inner-petal" style="--i:6"></div>
        <div class="petal inner-petal" style="--i:7"></div>
      </div>
      <!-- Center -->
      <div class="flower-center">
        <div class="center-core"></div>
        <div class="pollen-dot" style="--pi:0"></div>
        <div class="pollen-dot" style="--pi:1"></div>
        <div class="pollen-dot" style="--pi:2"></div>
        <div class="pollen-dot" style="--pi:3"></div>
        <div class="pollen-dot" style="--pi:4"></div>
        <div class="pollen-dot" style="--pi:5"></div>
      </div>
    </div>

  </div>

  <!-- Butterflies -->
  <div class="butterfly butterfly-1" id="butterfly1">
    <div class="wing wing-left"></div>
    <div class="wing wing-right"></div>
    <div class="butterfly-body"></div>
  </div>
  <div class="butterfly butterfly-2" id="butterfly2">
    <div class="wing wing-left"></div>
    <div class="wing wing-right"></div>
    <div class="butterfly-body"></div>
  </div>

  <!-- Floating petals -->
  <div class="floating-petals" id="floatingPetals"></div>

  <!-- Title -->
  <div class="title-card">
    <h1 class="title">To Aisha</h1>
    <p class="subtitle">from Ismail🌸</p>
  </div>

  <!-- Sparkles -->
  <div class="sparkles" id="sparkles"></div>

  <script src="script.js"></script>
</body>
</html>
