<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>For Aisha🌸</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital@1&family=Cormorant+Garamond:wght@300&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#0d001a}

.scene{
  position:relative;width:100vw;height:100vh;overflow:hidden;
  background:linear-gradient(180deg,#1a0533 0%,#3b0f6e 45%,#8b2fc9 75%,#c2507a 90%,#e8887a 100%);
  display:flex;align-items:flex-end;justify-content:center;
}

#particleCanvas{position:absolute;inset:0;pointer-events:none;z-index:1}

.message{
  position:absolute;top:8%;left:50%;transform:translateX(-50%);
  text-align:center;z-index:10;
  animation:fadeInDown 2s ease forwards;opacity:0;
}
.heart{
  display:block;font-size:2.5rem;color:#ff79c6;margin-bottom:.3rem;
  animation:heartbeat 1.6s ease-in-out infinite;
  filter:drop-shadow(0 0 12px #ff79c6);
}
@keyframes heartbeat{
  0%,100%{transform:scale(1)}14%{transform:scale(1.3)}
  28%{transform:scale(1)}42%{transform:scale(1.2)}70%{transform:scale(1)}
}
.message h1{
  font-family:'Playfair Display',serif;font-style:italic;
  font-size:clamp(2.8rem,7vw,5.5rem);color:#fff;letter-spacing:.04em;
  text-shadow:0 0 30px rgba(255,121,198,.7),0 0 80px rgba(199,146,234,.4),0 2px 6px rgba(0,0,0,.5);
}
.subtitle{
  font-family:'Cormorant Garamond',serif;font-weight:300;
  font-size:clamp(1rem,2.5vw,1.4rem);color:rgba(255,255,255,.6);
  letter-spacing:.35em;text-transform:lowercase;margin-top:.6rem;
}
@keyframes fadeInDown{
  from{opacity:0;transform:translateX(-50%) translateY(-20px)}
  to{opacity:1;transform:translateX(-50%) translateY(0)}
}

.ground{
  position:absolute;bottom:0;width:100%;height:14vh;z-index:5;
  background:linear-gradient(180deg,#2a0d45 0%,#150826 100%);
  border-radius:60% 60% 0 0/20% 20% 0 0;
}
.ground::before{
  content:'';position:absolute;top:-6px;left:0;width:100%;height:14px;
  background:linear-gradient(90deg,transparent 0%,rgba(255,121,198,.35) 30%,rgba(248,213,107,.3) 60%,transparent 100%);
  filter:blur(4px);
}

.garden{
  position:absolute;bottom:12vh;left:50%;transform:translateX(-50%);
  width:90vw;max-width:960px;display:flex;justify-content:center;
  align-items:flex-end;z-index:6;
}

.flower{
  position:relative;display:flex;flex-direction:column;align-items:center;
  transform-origin:bottom center;opacity:0;
  animation:growIn 1.2s cubic-bezier(.22,1,.36,1) var(--gd,0s) forwards,
            sway var(--sd,3s) ease-in-out calc(var(--gd,0s) + 1.2s) infinite alternate;
}
@keyframes growIn{from{opacity:0;transform:scaleY(0) translateY(20px)}to{opacity:1;transform:scaleY(1) translateY(0)}}
@keyframes sway{from{transform:rotate(var(--lean,-2deg))}to{transform:rotate(calc(var(--lean,-2deg) + 6deg))}}

.stem{
  border-radius:4px 4px 2px 2px;
  background:linear-gradient(180deg,#5ecc88,#4caf78 60%,#2d7a4f);
  position:relative;
}
.leaf{
  position:absolute;border-radius:0 80% 0 80%;
  background:linear-gradient(135deg,#5ecc88,#2d8a50);
}
.leaf.l{left:-120%;transform-origin:right center;animation:leafSwayL 2.5s ease-in-out infinite alternate}
.leaf.r{right:-120%;transform-origin:left center;animation:leafSwayR 2.5s ease-in-out infinite alternate}
@keyframes leafSwayL{from{transform:rotate(20deg)}to{transform:rotate(0deg)}}
@keyframes leafSwayR{from{transform:rotate(-20deg)}to{transform:rotate(0deg)}}

.bloom{position:relative;margin-bottom:-4px}

.petal{
  position:absolute;border-radius:50% 50% 30% 30%;
  top:50%;left:50%;transform-origin:bottom center;
  background:var(--pc,#ff79c6);opacity:0;
  animation:petalBloom .8s ease var(--pd,0s) forwards,
            petalFloat 3s ease-in-out calc(var(--pd,0s) + .8s) infinite alternate;
}
@keyframes petalBloom{
  from{opacity:0;transform:translate(-50%,-100%) rotate(var(--rot,0deg)) scaleY(0)}
  to{opacity:.9;transform:translate(-50%,-100%) rotate(var(--rot,0deg)) scaleY(1)}
}
@keyframes petalFloat{
  from{transform:translate(-50%,-100%) rotate(var(--rot,0deg)) scaleY(1)}
  to{transform:translate(-50%,-100%) rotate(var(--rot,0deg)) scaleY(1.07) translateY(-3px)}
}

.center{
  position:absolute;border-radius:50%;top:50%;left:50%;
  transform:translate(-50%,-50%);z-index:2;
  background:var(--cc,#f8d56b);
  animation:cPulse 2s ease-in-out infinite alternate;
}
@keyframes cPulse{
  from{box-shadow:0 0 8px 2px var(--cg,rgba(248,213,107,.5))}
  to{box-shadow:0 0 18px 7px var(--cg,rgba(248,213,107,.8))}
}
</style>
</head>
<body>
<div class="scene">
  <canvas id="particleCanvas"></canvas>
  <div class="message">
    <span class="heart">♡</span>
    <h1>For Aisha❤️</h1>
    <p class="subtitle">From Ismail</p>
  </div>
  <div class="garden" id="garden"></div>
  <div class="ground"></div>
</div>

<script>
const FLOWERS = [
  {n:8,  pc:'#ff79c6',cc:'#f8d56b',cg:'rgba(248,213,107,.7)',bs:62,sh:150,sw:5,ls:26,lean:-3,sd:3.2,gd:.1},
  {n:6,  pc:'#c792ea',cc:'#ffffff',cg:'rgba(255,255,255,.6)',bs:48,sh:120,sw:4,ls:20,lean: 2,sd:2.8,gd:.4},
  {n:10, pc:'#ff9de2',cc:'#f8d56b',cg:'rgba(248,213,107,.7)',bs:70,sh:175,sw:6,ls:30,lean:-1,sd:3.6,gd:.7},
  {n:7,  pc:'#ffd6e8',cc:'#ff79c6',cg:'rgba(255,121,198,.6)',bs:54,sh:135,sw:4,ls:22,lean: 3,sd:3.0,gd:1.0},
  {n:8,  pc:'#a0e7ff',cc:'#ffffff',cg:'rgba(255,255,255,.6)',bs:58,sh:160,sw:5,ls:24,lean:-2,sd:2.6,gd:1.3},
  {n:6,  pc:'#ffb3de',cc:'#f8d56b',cg:'rgba(248,213,107,.7)',bs:44,sh:110,sw:4,ls:18,lean: 1,sd:3.4,gd:1.6},
  {n:9,  pc:'#e89fff',cc:'#f8d56b',cg:'rgba(248,213,107,.7)',bs:65,sh:155,sw:5,ls:26,lean:-3,sd:3.1,gd:1.9},
  {n:5,  pc:'#ff79c6',cc:'#c792ea',cg:'rgba(199,146,234,.6)',bs:50,sh:125,sw:4,ls:20,lean: 2,sd:2.9,gd:2.2},
];

function buildFlower(f) {
  const wrap = document.createElement('div');
  wrap.className = 'flower';
  wrap.style.cssText = `--gd:${f.gd}s;--sd:${f.sd}s;--lean:${f.lean}deg;margin:0 ${8+Math.random()*10}px`;

  const bloom = document.createElement('div');
  bloom.className = 'bloom';
  bloom.style.cssText = `width:${f.bs}px;height:${f.bs}px`;

  for (let i = 0; i < f.n; i++) {
    const p = document.createElement('div');
    p.className = 'petal';
    p.style.cssText = `--rot:${(360/f.n)*i}deg;--pc:${f.pc};--pd:${(f.gd+.5+i*.06).toFixed(2)}s;width:${f.bs*.38}px;height:${f.bs*.5}px`;
    bloom.appendChild(p);
  }

  const c = document.createElement('div');
  c.className = 'center';
  c.style.cssText = `--cc:${f.cc};--cg:${f.cg};width:${f.bs*.32}px;height:${f.bs*.32}px`;
  bloom.appendChild(c);

  const stem = document.createElement('div');
  stem.className = 'stem';
  stem.style.cssText = `width:${f.sw}px;height:${f.sh}px`;

  [['l',38],['r',58]].forEach(([s,t])=>{
    const leaf = document.createElement('div');
    leaf.className = `leaf ${s}`;
    leaf.style.cssText = `width:${f.ls}px;height:${(f.ls*.55).toFixed(1)}px;top:${t}%`;
    stem.appendChild(leaf);
  });

  wrap.appendChild(bloom);
  wrap.appendChild(stem);
  return wrap;
}

document.getElementById('garden').append(...FLOWERS.map(buildFlower));

// Canvas
const canvas = document.getElementById('particleCanvas');
const ctx = canvas.getContext('2d');
const COLS = ['#ff79c6','#c792ea','#ffb3de','#e89fff','#ffd6e8','#a0e7ff'];

function resize(){canvas.width=innerWidth;canvas.height=innerHeight}
resize(); addEventListener('resize',resize);

const stars = Array.from({length:150},()=>({
  x:Math.random(),y:Math.random()*.68,r:Math.random()*1.4+.3,
  a:Math.random()*.5+.3,ts:Math.random()*.02+.005,to:Math.random()*Math.PI*2
}));

const flies = Array.from({length:32},()=>({
  x:Math.random(),y:.4+Math.random()*.45,r:Math.random()*2.5+1.2,
  col:COLS[Math.random()*COLS.length|0],
  vx:(Math.random()-.5)*.0007,vy:(Math.random()-.5)*.0004,
  a:Math.random(),ad:Math.random()>.5?1:-1,as:Math.random()*.015+.005,
  to:Math.random()*Math.PI*2
}));

const mkP=(init)=>({
  x:Math.random(),y:init?Math.random():-.06,
  sz:Math.random()*9+4,col:COLS[Math.random()*COLS.length|0],
  vy:Math.random()*.0013+.0005,vx:(Math.random()-.5)*.0007,
  rot:Math.random()*Math.PI*2,rs:(Math.random()-.5)*.04,
  a:Math.random()*.55+.3,wb:Math.random()*Math.PI*2,ws:Math.random()*.04+.01
});
const petals = Array.from({length:40},()=>mkP(true));

function h2r(h,a){const r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16);return`rgba(${r},${g},${b},${a})`}

let t=0;
(function render(){
  t+=.016;
  const W=canvas.width,H=canvas.height;
  ctx.clearRect(0,0,W,H);

  stars.forEach(s=>{
    const a=s.a+.25*Math.sin(t*s.ts*60+s.to);
    ctx.beginPath();ctx.arc(s.x*W,s.y*H,s.r,0,Math.PI*2);
    ctx.fillStyle=`rgba(255,255,255,${Math.max(.05,a)})`;ctx.fill();
  });

  flies.forEach(f=>{
    f.x+=f.vx+Math.sin(t*.7+f.to)*.0003;
    f.y+=f.vy+Math.cos(t*.5+f.to)*.0002;
    if(f.x<0)f.x=1;if(f.x>1)f.x=0;
    if(f.y<.3)f.vy=Math.abs(f.vy);if(f.y>.93)f.vy=-Math.abs(f.vy);
    f.a+=f.ad*f.as;if(f.a>=1){f.a=1;f.ad=-1}if(f.a<=0){f.a=0;f.ad=1}
    ctx.beginPath();ctx.arc(f.x*W,f.y*H,f.r,0,Math.PI*2);
    ctx.fillStyle=h2r(f.col,f.a*.9);
    ctx.shadowBlur=16;ctx.shadowColor=f.col;ctx.fill();ctx.shadowBlur=0;
  });

  petals.forEach((p,i)=>{
    p.wb+=p.ws;p.x+=p.vx+Math.sin(p.wb)*.0004;p.y+=p.vy;p.rot+=p.rs;
    if(p.y>1.06)petals[i]=mkP(false);
    ctx.save();ctx.globalAlpha=p.a;ctx.fillStyle=p.col;
    ctx.translate(p.x*W,p.y*H);ctx.rotate(p.rot);
    ctx.beginPath();ctx.ellipse(0,-p.sz/2,p.sz*.38,p.sz*.55,0,0,Math.PI*2);
    ctx.fill();ctx.restore();
  });

  requestAnimationFrame(render);
})();
</script>
</body>
</html>
